name: verba
description: Russian vocabulary learning app for Windows.
publish_to: 'none'
version: 0.11.0+131

environment:
  sdk: ^3.12.2

dependencies:
  audioplayers: ^6.8.1
  file_picker: ^8.0.7
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  flutter_tts: ^4.2.5
  package_info_plus: 8.0.0
  path_provider: ^2.1.6
  shared_preferences: ^2.5.5
  window_manager: ^0.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/sounds/
    - assets/lector/google/
    - assets/lector/google_slow/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
